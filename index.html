<!DOCTYPE html>
<html lang="en">
<head>
    <title>Auto-Updating JSON Cards</title>
</head>
<body>

    <div id="card-container"></div>

    <script>
        // 1. Wrap your code inside a reusable function
        function loadCards() {
            fetch('https://865-parc.github.io/JSON-Lijsten/productenleist.json')
                .then(response => response.json())
                .then(jsonData => {
                    const container = document.getElementById('card-container');
                    
                    // CRITICAL STEP: Clear out the old cards before drawing the new ones
                    container.innerHTML = ''; 

                    // 2. Loop and build the cards just like before
                    Object.keys(jsonData).forEach(key => {
                        const product = jsonData[key];
                        const card = document.createElement('div');

                        card.innerHTML = `
                            <h2>${product.Naam}</h2>
                            <p>${product.Beschrijving}</p>
                            <p>Prijs: ${product.Prijs}</p>
                            <p>Makelaar: ${product.maakelaar}</p>
                            <hr>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(error => console.error("Error loading data:", error));
        }

        // 3. Run the function immediately when the page first opens
        loadCards();

        // 4. Automatically run the function every 5000 milliseconds (5 seconds)
        setInterval(loadCards, 5000);
    </script>

</body>
</html>
