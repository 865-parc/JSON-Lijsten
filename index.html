<!DOCTYPE html>
<html lang="en">
<head>
    <title>Learn Dynamic Cards</title>
</head>
<body>

    <div id="card-container"></div>

    <script>
        const jsonData = {
            "1": {
                "Naam": "Product1",
                "Beschrijving": "Dit is een test product",
                "Prijs": "€15",
                "maakelaar": "bedrijf b.v."
            },
            "2": {
                "Naam": "Product2",
                "Beschrijving": "Dit is een test product",
                "Prijs": "€14",
                "maakelaar": "bedrijf2 b.v."
            }
        };

        const container = document.getElementById('card-container');

        Object.keys(jsonData).forEach(key => {
            const product = jsonData[key]; 

            const card = document.createElement('div');

            card.innerHTML = `
                <h2>${product.Naam}</h2>
                <p>${product.Beschrijving}</p>
                <p>Prijs: ${product.Prijs}</p>
                <p>Makelaar: ${product.maakelaar}</p>
                <hr> 
            `;

            
            container.appendChild(card);
        });
    </script>

</body>
</html>
